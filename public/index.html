<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Product Manager</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Product Management</h1>
      <div id="auth-section" class="card">
        <h2>Authentication</h2>
        <div id="authed" class="hidden">
          <p>
            Logged in as <span id="user-email"></span>
            <span id="user-role" class="badge"></span>
          </p>
          <button id="logout-btn">Logout</button>
        </div>
        <div id="auth-forms">
          <div class="form" id="login-form">
            <h3>Login</h3>
            <input id="login-email" type="email" placeholder="Email" />
            <input id="login-password" type="password" placeholder="Password" />
            <button id="login-btn">Login</button>
            <div class="hint">Seed admin: admin@local.test / admin123</div>
          </div>
          <div class="form" id="register-form">
            <h3>Register</h3>
            <input id="reg-email" type="email" placeholder="Email" />
            <input id="reg-password" type="password" placeholder="Password (min 6)" />
            <button id="register-btn">Register</button>
          </div>
        </div>
      </div>

      <div id="products-section" class="card">
        <h2>Products</h2>

        <div id="admin-create" class="hidden">
          <h3>Create / Edit Product</h3>
          <input id="p-name" placeholder="Name" />
          <input id="p-desc" placeholder="Description" />
          <input id="p-price" type="number" step="0.01" placeholder="Price" />
          <input id="p-stock" type="number" step="1" placeholder="Stock" />
          <button id="create-btn">Create</button>
          <button id="update-btn" class="hidden">Update</button>
          <button id="cancel-edit-btn" class="hidden">Cancel</button>
        </div>

        <div id="products-list"></div>
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
  </html>
